  bg: "#FDF8F3",
  card: "#FFFFFF",
  primary: "#7C9E8A",
  primaryDark: "#5A7D68",
  accent: "#E8A87C",
  accentLight: "#FDF0E6",
  soft: "#F4EDE4",

const fmt12 = (d) => {
  if (!d) return "";
  const h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2, "0")} ${ampm}`;
};

const fmt12str = (timeStr) => {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2, "0")} ${ampm}`;
};

const strToDate = (timeStr, base = new Date()) => {
  const d = new Date(base);
  const [h, m] = timeStr.split(":").map(Number);
  d.setHours(h, m, 0, 0);
  return d;
};

const addMins = (date, mins) => new Date(date.getTime() + mins * 60000);

const diffMins = (a, b) => Math.round((b - a) / 60000);

const toTimeInput = (date) => {
  if (!date) return "";
  return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
};

const durationLabel = (mins) => {
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins / 60)}h ${mins % 60 > 0 ? (mins % 60) + "m" : ""}`.trim();
};

// ─── Schedule Generator ───────────────────────────────────────────────────────
// Rules:
//  • Try to fit ALL numNaps requested. Reduce WW evenly (max 15%) if needed.
//  • If still can't fit, reduce nap count. Shorten naps progressively (min 20min).
//  • Only add a BRIDGING nap if all numNaps fit AND there is still excess awake time.
//  • Bridging nap duration: bridgingNapMins ≤ bridge ≤ napDurationMins.
//  • Excess slack beyond a full bridging nap shifts bedtime earlier.
function generateSchedule({ wakeTime, bedTime, numNaps, wakeWindowMins, napDurationMins, bridgingNapMins = 20 }) {
  const wakeDate = strToDate(wakeTime);
  const bedDate  = strToDate(bedTime);
  if (bedDate <= wakeDate) bedDate.setDate(bedDate.getDate() + 1);

  const available  = diffMins(wakeDate, bedDate);
  const minWW      = Math.floor(wakeWindowMins * 0.85);
  const minNapDur  = 20;

  let actualWW  = wakeWindowMins;
  let n         = numNaps;
  let napDurs   = Array(n).fill(napDurationMins);
  let bridgeDur = null;

  // ── Step 1: fit all numNaps by reducing WW if needed ─────────────────────
  // Required: (n+1)*ww + n*nap = available  →  ww = (available - n*nap) / (n+1)
  const wwForAll = (available - n * napDurationMins) / (n + 1);
  if (wwForAll >= minWW) {
    // All requested naps fit — use evenly distributed WW, no bridging needed
    actualWW = wwForAll;
  } else {
    // Can't fit all naps even at min WW — reduce nap count until they fit
    while (n > 0 && (n + 1) * minWW + n * napDurationMins > available) n--;
    actualWW = minWW;

    if (n > 0) {
      // Shorten naps progressively (last first) if still needed
      const wwExact = (available - n * napDurationMins) / (n + 1);
      if (wwExact >= minWW) {
        actualWW = wwExact;
      } else {
        // Need to shorten naps too
        const totalNapRoom = available - (n + 1) * minWW;
        const totalNap = Math.max(n * minNapDur, Math.min(n * napDurationMins, totalNapRoom));
        const perNap = Math.floor(totalNap / n);
        const rem = totalNap - perNap * n;
        napDurs = Array(n).fill(perNap).map((d, i) => d + (i < rem ? 1 : 0));
        actualWW = minWW;
      }
    }

    // ── Only add bridging nap if n == numNaps AND slack remains ──────────────
    // (if n was reduced, the dropped naps are just gone — no bridging)
    if (n === numNaps) {
      const slack = available - (n + 1) * actualWW - napDurs.reduce((a, b) => a + b, 0);
      if (slack > 0) {
        const bridge = Math.min(Math.max(bridgingNapMins, slack - (n + 2) * actualWW), napDurationMins);
        if (bridge >= bridgingNapMins) bridgeDur = bridge;
      }
    }
  }

  // ── Step 2: check for slack when all naps fit at requested WW ────────────
  // (wwForAll >= minWW path — may still have slack if we used exact wwForAll)
  // No bridging needed in this path: WW was adjusted to use all available time exactly.

  // ── Step 3: build events ──────────────────────────────────────────────────
  const events = [];
  events.push({ id: 'wake-0', type: 'wake', label: 'Wake Up', start: new Date(wakeDate), end: null, editable: true });

  let cursor = new Date(wakeDate);
  // Pre-compute nap start times
  let tempCursor = new Date(wakeDate);
  const allNapStarts = [];
  for (let i = 0; i < n; i++) {
    const ns = addMins(tempCursor, actualWW);
    allNapStarts.push(ns);
    tempCursor = addMins(ns, napDurs[i]);
  }
  const bridgeStart = bridgeDur !== null ? addMins(tempCursor, actualWW) : null;

  for (let i = 0; i < n; i++) {
    const napStart = allNapStarts[i];
    const napEnd   = addMins(napStart, napDurs[i]);
    events.push({ id: `wake-${i + 1}`, type: 'wake', label: `Wake Window ${i + 1}`, start: new Date(cursor), end: napStart, editable: false });
    events.push({ id: `nap-${i}`, type: 'nap', label: `Nap ${i + 1}`, start: napStart, end: napEnd, editable: true, originalDurationMins: napDurationMins });
    cursor = napEnd;
  }

  if (bridgeDur !== null) {
    const bridgeEnd = addMins(bridgeStart, bridgeDur);
    events.push({ id: `wake-bridge-pre`, type: 'wake', label: `Wake Window ${n + 1}`, start: new Date(cursor), end: bridgeStart, editable: false });
    events.push({ id: 'nap-bridge', type: 'nap', label: 'Bridging Nap', start: bridgeStart, end: bridgeEnd, editable: true, originalDurationMins: bridgeDur, isBridging: true });
    cursor = bridgeEnd;
  }

  const totalNaps = n + (bridgeDur !== null ? 1 : 0);
  events.push({ id: 'wake-final', type: 'wake', label: `Wake Window ${totalNaps + 1}`, start: new Date(cursor), end: new Date(bedDate), editable: false });
  events.push({ id: 'bed', type: 'sleep', label: 'Bedtime', start: new Date(bedDate), end: null, editable: true, originalFinalWW: actualWW });
  return events;
}


function rebuildFromIndex(events, fromIdx, settings) {
  const {
    wakeWindowMins,
    napDurationMins,
    bedTime,
    wakeTime,
    bridgingNapMins = 20,
    bedtimeToleranceMins = 60,
  } = settings;

  const minWW     = Math.floor(wakeWindowMins * 0.85);
  const minNapDur = 20;

  const targetBed = strToDate(bedTime);
  if (targetBed <= strToDate(wakeTime)) targetBed.setDate(targetBed.getDate() + 1);

  // Use the wake window the schedule was actually generated with
  const bedEvent    = events.find(e => e.id === 'bed');
  const scheduledWW = bedEvent?.scheduledWW ?? wakeWindowMins;

  const prefix       = events.slice(0, fromIdx + 1).map(e => ({ ...e }));
  const startCursor  = new Date(prefix[fromIdx].end || prefix[fromIdx].start);
  const remainingRegularNaps = events.slice(fromIdx + 1).filter(e => e.type === 'nap' && !e.isBridging);

  // ── Step 1: fit all remaining regular naps ────────────────────────────────
  const available = diffMins(startCursor, targetBed);
  let n       = remainingRegularNaps.length;
  let napDurs = remainingRegularNaps.map(r => r.originalDurationMins || napDurationMins);
  let actualWW = scheduledWW;

  if (n > 0) {
    const wwForAll = (available - napDurs.slice(0,n).reduce((a,b)=>a+b,0)) / (n + 1);
    if (wwForAll >= minWW) {
      actualWW = wwForAll; // distribute evenly, all naps fit
    } else {
      // Reduce nap count until they fit at minWW
      while (n > 0 && (n + 1) * minWW + napDurs.slice(0,n).reduce((a,b)=>a+b,0) > available) {
        n--;
        napDurs = napDurs.slice(0, n);
      }
      if (n > 0) {
        const wwExact = (available - napDurs.reduce((a,b)=>a+b,0)) / (n + 1);
        actualWW = Math.min(wakeWindowMins, wwExact >= minWW ? wwExact : minWW);
      }
    }
    // Never exceed wakeWindowMins
    actualWW = Math.min(actualWW, wakeWindowMins);
  }

  // ── Step 2: compute last nap end and natural bedtime ──────────────────────
  // Wake windows are FIXED at wakeWindowMins (or actualWW, whichever is lower).
  // Natural bedtime = lastNapEnd + wakeWindowMins (always fixed final WW).
  let cur = 0;
  for (let i = 0; i < n; i++) cur += actualWW + napDurs[i];
  const lastNapEnd   = addMins(startCursor, cur);
  const naturalBed   = addMins(lastNapEnd, wakeWindowMins); // final WW always = wakeWindowMins
  const bedDiff      = diffMins(naturalBed, targetBed); // +ve = natural bed before target

  // ── Step 3: bridging nap ──────────────────────────────────────────────────
  // Wake windows are a MAXIMUM (not exact) — they can be shorter if needed.
  // Bridge added when bedtime would be more than tolerance before target.
  // Total time from lastNapEnd to targetBed = wwBefore + bridgeDur + wwAfter
  // Minimise bridgeDur (use bridgingNapMins), split remaining equally as wake windows.
  // Wake windows must not exceed wakeWindowMins.
  let bridgeDur    = null;
  let wwBeforeBridge = wakeWindowMins;
  let wwAfterBridge  = wakeWindowMins;
  const totalAvail = diffMins(lastNapEnd, targetBed);
  if (bedDiff > bedtimeToleranceMins && totalAvail >= bridgingNapMins + 2) {
    // Use minimum bridge duration, split remaining time equally as wake windows
    const minBridge = bridgingNapMins;
    const maxBridge = Math.min(napDurationMins, totalAvail - 2); // leave at least 1 min each side
    bridgeDur = Math.min(maxBridge, Math.max(minBridge, totalAvail - 2 * wakeWindowMins));
    if (bridgeDur < minBridge) bridgeDur = null;
    else {
      // Split remaining time equally as pre/post bridge wake windows (capped at wakeWindowMins)
      const remainingForWW = totalAvail - bridgeDur;
      wwBeforeBridge = Math.min(wakeWindowMins, Math.floor(remainingForWW / 2));
      wwAfterBridge  = Math.min(wakeWindowMins, remainingForWW - wwBeforeBridge);
    }
  }

  // ── Step 4: build events ──────────────────────────────────────────────────
  const newItems  = [];
  let buildCursor = new Date(startCursor);
  let wwNum       = prefix.filter(e => e.type === 'wake' && e.id !== 'wake-0').length;

  for (let i = 0; i < n; i++) {
    const napStart = addMins(buildCursor, actualWW);
    const napEnd   = addMins(napStart, napDurs[i]);
    wwNum++;
    newItems.push({ id: `wake-r-${i}-pre-${napStart.getTime()}`, type: 'wake', label: `Wake Window ${wwNum}`, start: new Date(buildCursor), end: napStart, editable: false });
    newItems.push({ ...remainingRegularNaps[i], start: napStart, end: napEnd, adjustedDur: undefined });
    buildCursor = napEnd;
  }

  if (bridgeDur !== null) {
    const bridgeStart = addMins(buildCursor, wwBeforeBridge);
    const bridgeEnd   = addMins(bridgeStart, bridgeDur);
    wwNum++;
    newItems.push({ id: `wake-r-bridge-pre-${bridgeStart.getTime()}`, type: 'wake', label: `Wake Window ${wwNum}`, start: new Date(buildCursor), end: bridgeStart, editable: false });
    newItems.push({ id: `nap-bridge-${Date.now()}`, type: 'nap', label: 'Bridging Nap', start: bridgeStart, end: bridgeEnd, editable: true, originalDurationMins: bridgeDur, isBridging: true });
    buildCursor = bridgeEnd;
  }

  wwNum++;
  const finalWWDur = bridgeDur !== null ? wwAfterBridge : wakeWindowMins;
  const finalBed = addMins(buildCursor, finalWWDur); // final WW
  newItems.push({ id: `wake-r-final-${buildCursor.getTime()}`, type: 'wake', label: `Wake Window ${wwNum}`, start: new Date(buildCursor), end: finalBed, editable: false });

  return [
    ...prefix,
    ...newItems,
    { id: 'bed', type: 'sleep', label: 'Bedtime', start: finalBed, end: null, editable: true, originalFinalWW: wakeWindowMins, scheduledWW: actualWW },
  ];
}

// ─── Edit Event Modal ─────────────────────────────────────────────────────────
function EditEventModal({ event, scheduleSettings, allEvents, onSave, onClose }) {
  const [startTime, setStartTime] = useState(toTimeInput(new Date(event.start)));
  const [endTime, setEndTime] = useState(event.end ? toTimeInput(new Date(event.end)) : "");

  const inp = {
    width: "100%", padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${PAL.border}`,
    fontSize: 15, background: PAL.soft, color: PAL.text, fontFamily: "inherit", outline: "none", boxSizing: "border-box",
  };

  const save = () => {
    const newStart = strToDate(startTime, new Date(event.start));
    let newEnd = endTime ? strToDate(endTime, new Date(event.start)) : null;
    if (newEnd && newEnd < newStart) newEnd.setDate(newEnd.getDate() + 1);

    let updated = allEvents.map(ev => ({ ...ev }));
    const idx = updated.findIndex(e => e.id === event.id);
    if (idx === -1) { onSave(updated); onClose(); return; }

    if (event.type === "nap") {
      const oldStart = new Date(event.start);
      const oldEnd = new Date(event.end);
      const oldDurMins = diffMins(oldStart, oldEnd);
      const maxDurMins = event.originalDurationMins || oldDurMins;

      // Resolve new end: cap duration at original — cannot extend a nap
      let resolvedDurMins = oldDurMins;
      if (newEnd) {
        const requestedDur = diffMins(newStart, newEnd);
        resolvedDurMins = Math.min(requestedDur, maxDurMins); // never extend
      }
      const resolvedEnd = addMins(newStart, resolvedDurMins);

      // Apply change to this nap
      updated[idx] = { ...updated[idx], start: newStart, end: resolvedEnd };

      // Rebuild everything after this nap using fixed wake windows
      const result = rebuildFromIndex(updated, idx, scheduleSettings);
      onSave(result);
      onClose();
      return;
    } else if (event.id === 'wake-0') {
      // Wake-up time changed — regenerate the whole schedule from new wake time
      const newWakeTime = toTimeInput(newStart);
      const newSettings = { ...scheduleSettings, wakeTime: newWakeTime };
      onSave(generateSchedule(newSettings));
      onClose();
      return;
    } else {
      // Bedtime or other: just update this event
      updated[idx] = { ...updated[idx], start: newStart, end: newEnd || updated[idx].end };
    }

    onSave(updated);
    onClose();
  };

  const hasEnd = event.type === "nap";

  return (
    <Overlay onClose={onClose}>
      <h3 style={{ margin: "0 0 4px", fontFamily: "'Playfair Display',Georgia,serif", color: PAL.text }}>Edit Event</h3>
      <p style={{ margin: "0 0 18px", color: PAL.muted, fontSize: 14 }}>{event.label}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <label style={{ fontSize: 13, color: PAL.muted }}>Start time
          <input type="time" style={{ ...inp, display: "block", marginTop: 4 }} value={startTime} onChange={e => setStartTime(e.target.value)} />
        </label>
        {hasEnd && (
          <label style={{ fontSize: 13, color: PAL.muted }}>End time
            <input type="time" style={{ ...inp, display: "block", marginTop: 4 }} value={endTime} onChange={e => setEndTime(e.target.value)} />
          </label>
        )}
        <button onClick={save} style={{ padding: "13px", borderRadius: 11, border: "none", background: PAL.primary, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginTop: 4 }}>
          Update Event
        </button>
      </div>
    </Overlay>
  );
}

// ─── Schedule Settings Modal ──────────────────────────────────────────────────
function ScheduleSettingsModal({ settings, onSave, onClose }) {
  const [s, setS] = useState({ ...settings });
  // Track raw string values for number fields so the input stays blank while editing
  const [raw, setRaw] = useState({});

  const inp = {
    width: "100%", padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${PAL.border}`,
    fontSize: 15, background: PAL.soft, color: PAL.text, fontFamily: "inherit", outline: "none", boxSizing: "border-box",
  };

  const fields = [
    { key: "wakeTime", label: "Morning wake time", type: "time" },
    { key: "bedTime", label: "Bedtime", type: "time" },
    { key: "numNaps", label: "Number of naps", type: "number" },
    { key: "wakeWindowMins", label: "Wake window (minutes)", type: "number" },
    { key: "napDurationMins", label: "Average nap duration (minutes)", type: "number" },
    { key: "bedtimeToleranceMins", label: "Wake window tolerance before bridging nap triggers (minutes)", type: "number" },
    { key: "bridgingNapMins", label: "Bridging nap length (minutes)", type: "number" },
  ];

  const handleChange = (key, type, value) => {
    if (type === "number") {
      // Always store the raw string while editing so blank stays blank
      setRaw(p => ({ ...p, [key]: value }));
      // Only commit a numeric value when there's actually a number present
      if (value !== "" && value !== "-") {
        setS(p => ({ ...p, [key]: Number(value) }));
      }
    } else {
      setS(p => ({ ...p, [key]: value }));
    }
  };

  const handleBlur = (key, type) => {
    if (type === "number") {
      // On blur, clear the raw override — input will fall back to the numeric state (showing 0 if empty)
      setRaw(p => {
        const next = { ...p };
        delete next[key];
        return next;
      });
      // If the field was left blank, commit 0
      if (raw[key] === "" || raw[key] === "-") {
        setS(p => ({ ...p, [key]: 0 }));
      }
    }
  };

  const getDisplayValue = (key, type) => {
    if (type === "number" && key in raw) return raw[key];
    return s[key];
  };

  return (
    <Overlay onClose={onClose}>
      <h3 style={{ margin: "0 0 18px", fontFamily: "'Playfair Display',Georgia,serif", color: PAL.text }}>Schedule Settings</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {fields.map(f => (
          <label key={f.key} style={{ fontSize: 13, color: PAL.muted }}>{f.label}
            <input
              type={f.type}
              style={{ ...inp, display: "block", marginTop: 4 }}
              value={getDisplayValue(f.key, f.type)}
              onChange={e => handleChange(f.key, f.type, e.target.value)}
              onBlur={() => handleBlur(f.key, f.type)}
            />
          </label>
        ))}
        <button onClick={() => { onSave(s); onClose(); }} style={{ padding: "13px", borderRadius: 11, border: "none", background: PAL.primary, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "inherit", marginTop: 4 }}>
          Generate Schedule
        </button>
      </div>
    </Overlay>
  );
}

function NapTimerCard({ activeSleep, lastNapId, onEnd }) {
  const [now, setNow] = useState(new Date());
  const [linked, setLinked] = useState(!!activeSleep.linkedToId);
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const totalSecs = Math.floor((now - activeSleep.start) / 1000);
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  const label = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  return (
    <div style={{ background: PAL.sleepLight, border: `1.5px solid ${PAL.sleep}`, borderRadius: 16, padding: '16px 18px', marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

// ─── AI Log Modal ─────────────────────────────────────────────────────────────
function AILogModal({ schedule, scheduleSettings, onSaveFeed, onSaveSleep, onUpdateSchedule, onClose }) {
  const [messages, setMessages] = useState([]); // {role:'user'|'assistant', text, actions?}
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = React.useRef(null);

  const EXAMPLES = [
    'How can I make bedtime earlier?',
    'Baby had 120ml formula at 2pm',
    'Nap from 1:15pm to 2:40pm',
    'Why is there a bridging nap?',
    'Skip the bridging nap',
  ];

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const scheduleContext = () => {
    const now = new Date();
    const allEvents = schedule.filter(e => e.type !== undefined);
    // Split into past and upcoming for the AI prompt
    const upcoming = allEvents.filter(e => {
      const evEnd = e.end ? new Date(e.end) : new Date(e.start);
      return evEnd >= now;
    });
    const past = allEvents.filter(e => {
      const evEnd = e.end ? new Date(e.end) : new Date(e.start);
      return evEnd < now;
    });
    const fmtEv = e => {
      const start = e.start ? fmt12(new Date(e.start)) : '';
      const end = e.end ? ` – ${fmt12(new Date(e.end))}` : '';
      return `${e.label}: ${start}${end}`;
    };
    const pastLines = past.length ? `PAST (cannot change):\n${past.map(fmtEv).join('\n')}` : '';
    const upcomingLines = upcoming.length ? `UPCOMING (can still change):\n${upcoming.map(fmtEv).join('\n')}` : '';
    return [pastLines, upcomingLines].filter(Boolean).join('\n\n');
  };

  const systemPrompt = () => {
    const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    const settings = `Wake: ${scheduleSettings.wakeTime}, Bed: ${scheduleSettings.bedTime}, Wake window: ${scheduleSettings.wakeWindowMins}min, Nap duration: ${scheduleSettings.napDurationMins}min, Bridging nap: ${scheduleSettings.bridgingNapMins}min`;
    return `You are LullaByte, a friendly baby schedule assistant. Current time: ${now}.

Current schedule settings: ${settings}

Current schedule:
${scheduleContext()}

IMPORTANT: Only suggest changes to UPCOMING events. Past events cannot be changed — never suggest adjusting wake up time, past naps, or anything that has already happened.

You can help with two types of requests:
1. LOGGING: if the user describes a feed or nap, respond with JSON action
2. SCHEDULE QUESTIONS: if the user asks about the schedule (e.g. "how can I make bedtime earlier?"), give 2-3 concrete suggestions with brief explanations, then offer to implement one. When suggesting actions, list them clearly numbered.

For LOGGING requests respond with JSON only:
{"action":"log","type":"feed","feedType":"formula"|"breast","offered":number|null,"consumed":number|null,"unit":"ml"|"oz","side":null,"duration":null,"time":"HH:MM"}
or {"action":"log","type":"sleep","start":"HH:MM","end":"HH:MM"|null}

For SCHEDULE QUESTIONS respond conversationally in plain text. At the end include a JSON block with available actions like:
ACTIONS:${JSON.stringify([
  {"id":"skip_bridge","label":"Skip bridging nap","description":"Remove the bridging nap and shift bedtime earlier"},
  {"id":"earlier_wake","label":"Wake baby earlier","description":"Adjust wake up time to shift the whole schedule"},
])}

For GENERAL QUESTIONS just respond conversationally with no JSON.
Keep responses concise and friendly. Never use markdown headers or bullet asterisks.`;
  };

  const applyAction = (actionId) => {
    const bedEvent = schedule.find(e => e.id === 'bed');
    const bridgeNap = schedule.find(e => e.isBridging);
    
    if (actionId === 'skip_bridge' && bridgeNap) {
      // Remove bridge nap and rebuild — find its index
      const idx = schedule.findIndex(e => e.isBridging);
      if (idx >= 0) {
        // Remove bridge nap and its preceding wake window, rebuild from previous nap
        const prevNapIdx = schedule.slice(0, idx).map((e,i)=>({e,i})).filter(({e})=>e.type==='nap').slice(-1)[0]?.i ?? 0;
        const withoutBridge = schedule.filter((e, i) => !e.isBridging && !(e.type==='wake' && i > prevNapIdx && i < idx));
        onUpdateSchedule(rebuildFromIndex(withoutBridge, prevNapIdx, scheduleSettings));
        setMessages(m => [...m, { role: 'assistant', text: '✅ Done — bridging nap removed and schedule updated.' }]);
      }
    }
  };

  const handleSend = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput('');
    setMessages(m => [...m, { role: 'user', text: userMsg }]);
    setLoading(true);

    try {
      const history = messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt(),
          messages: [...history, { role: 'user', content: userMsg }],
        }),
      });
      const data = await res.json();
      const raw = (data.content || []).map(c => c.text || '').join('').trim();

      // Try to parse as pure log action
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        const obj = JSON.parse(clean);
        if (obj.action === 'log') {
          setMessages(m => [...m, { role: 'assistant', text: raw, parsed: obj }]);
          setLoading(false);
          return;
        }
      } catch (_) {}

      // Extract ACTIONS block if present
      const actionsMatch = raw.match(/ACTIONS:(\[[\s\S]*?\])/);
      let actions = null;
      let displayText = raw;
      if (actionsMatch) {
        try {
          actions = JSON.parse(actionsMatch[1]);
          displayText = raw.replace(/ACTIONS:\[[\s\S]*?\]/, '').trim();
        } catch (_) {}
      }

      setMessages(m => [...m, { role: 'assistant', text: displayText, actions }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'assistant', text: 'Something went wrong. Please try again.' }]);
    }
    setLoading(false);
  };

  const handleConfirmLog = (parsed) => {
    if (parsed.type === 'feed') {
      onSaveFeed({ id: Date.now(), type: parsed.feedType || 'formula', offered: parsed.offered ?? null, consumed: parsed.consumed ?? null, unit: parsed.unit || 'ml', side: parsed.side || null, duration: parsed.duration || null, time: parsed.time || toTimeInput(new Date()) });
      setMessages(m => [...m.slice(0,-1), { ...m[m.length-1], confirmed: true }, { role: 'assistant', text: '✅ Feed logged!' }]);
    } else if (parsed.type === 'sleep') {
      const base = new Date();
      const startDate = strToDate(parsed.start, base);
      const endDate = parsed.end ? strToDate(parsed.end, base) : null;
      onSaveSleep({ id: Date.now(), start: startDate, end: endDate, isNight: false, linkedToId: null });
      setMessages(m => [...m.slice(0,-1), { ...m[m.length-1], confirmed: true }, { role: 'assistant', text: '✅ Nap logged!' }]);
    }
  };

  const inp = { width: '100%', padding: '10px 12px', borderRadius: 10, border: `1.5px solid ${PAL.border}`, fontSize: 14, background: PAL.soft, color: PAL.text, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box', resize: 'none' };

  return (
    <Overlay onClose={onClose}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
        <div style={{ width: 32, height: 32, borderRadius: 10, background: 'linear-gradient(135deg, #7C9E8A, #A8C4D4)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>✨</div>
        <h3 style={{ margin: 0, fontFamily: "'Playfair Display',Georgia,serif", color: PAL.text }}>Ask LullaByte</h3>
      </div>
      <p style={{ margin: '0 0 12px', color: PAL.muted, fontSize: 13 }}>Log a feed or nap, or ask about the schedule</p>

      {/* Chat history */}
      <div style={{ maxHeight: 320, overflowY: 'auto', marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {messages.length === 0 && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {EXAMPLES.map(ex => (
              <button key={ex} onClick={() => setInput(ex)} style={{ fontSize: 11, padding: '5px 10px', borderRadius: 20, border: `1px solid ${PAL.border}`, background: PAL.soft, color: PAL.muted, cursor: 'pointer', fontFamily: 'inherit' }}>{ex}</button>
            ))}
          </div>
        )}
        {messages.map((msg, i) => (
          <div key={i}>
            <div style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth: '85%', padding: '10px 13px', borderRadius: msg.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px', background: msg.role === 'user' ? 'linear-gradient(135deg, #7C9E8A, #A8C4D4)' : PAL.soft, color: msg.role === 'user' ? '#fff' : PAL.text, fontSize: 13, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>
                {msg.text}
              </div>
            </div>
            {/* Log confirm buttons */}
            {msg.parsed && !msg.confirmed && (
              <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                <button onClick={() => handleConfirmLog(msg.parsed)} style={{ flex: 2, padding: '9px', borderRadius: 10, border: 'none', background: 'linear-gradient(135deg, #7C9E8A, #A8C4D4)', color: '#fff', fontWeight: 700, cursor: 'pointer', fontSize: 13, fontFamily: 'inherit' }}>✓ Confirm & Save</button>
                <button onClick={() => setMessages(m => m.filter((_,j) => j !== i))} style={{ flex: 1, padding: '9px', borderRadius: 10, border: `1.5px solid ${PAL.border}`, background: 'transparent', color: PAL.muted, cursor: 'pointer', fontSize: 13, fontFamily: 'inherit' }}>Discard</button>
              </div>
            )}
            {/* Schedule action buttons */}
            {msg.actions && !msg.actionsApplied && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 8 }}>
                {msg.actions.map(action => (
                  <button key={action.id} onClick={() => { applyAction(action.id); setMessages(m => m.map((mm,j) => j===i ? {...mm, actionsApplied:true} : mm)); }} style={{ width: '100%', padding: '9px 12px', borderRadius: 10, border: `1.5px solid ${PAL.primary}`, background: PAL.soft, color: PAL.primary, fontWeight: 600, cursor: 'pointer', fontSize: 13, fontFamily: 'inherit', textAlign: 'left' }}>
                    <span style={{ fontWeight: 700 }}>{action.label}</span>
                    {action.description && <span style={{ color: PAL.muted, fontSize: 12, display: 'block', marginTop: 2 }}>{action.description}</span>}
                  </button>
                ))}
                <button onClick={() => setMessages(m => m.map((mm,j) => j===i ? {...mm, actionsApplied:true} : mm))} style={{ width: '100%', padding: '8px', borderRadius: 10, border: `1.5px solid ${PAL.border}`, background: 'transparent', color: PAL.muted, cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' }}>Leave as is</button>
              </div>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
            <div style={{ padding: '10px 14px', borderRadius: '14px 14px 14px 4px', background: PAL.soft, display: 'flex', gap: 4, alignItems: 'center' }}>
              {[0,1,2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: PAL.muted, animation: `pulse 1.2s ease-in-out ${i*0.2}s infinite` }} />)}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div style={{ display: 'flex', gap: 8 }}>
        <textarea rows={2} style={{ ...inp, flex: 1 }} placeholder="Ask anything or describe a feed/nap…" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }} />
        <button onClick={handleSend} disabled={loading || !input.trim()} style={{ width: 44, borderRadius: 10, border: 'none', background: 'linear-gradient(135deg, #7C9E8A, #A8C4D4)', color: '#fff', fontSize: 18, cursor: 'pointer', opacity: (loading || !input.trim()) ? 0.5 : 1 }}>↑</button>
      </div>
    </Overlay>
  );
}

function ScheduleTab({ schedule, scheduleSettings, feeds, sleeps, onUpdateSchedule, onSaveScheduleSettings, onSaveFeed, onSaveSleep }) {
  const [showSettings, setShowSettings] = useState(false);
  const [editEvent, setEditEvent] = useState(null);
  const [showFeedModal, setShowFeedModal] = useState(false);
  const [showNightSleep, setShowNightSleep] = useState(false);
  const [showAI, setShowAI] = useState(false);
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);
  const [editFeed, setEditFeed] = useState(null);
  const [editSleep, setEditSleep] = useState(null);
  const [activeSleep, setActiveSleep] = useState(null); // {start: Date}
  const [showNapModal, setShowNapModal] = useState(false);

  const todayFeeds = feeds.filter(f => {
    const d = strToDate(f.time);
    const today = new Date();
    return d.toDateString() === today.toDateString();
  });

  const todaySleeps = sleeps.filter(s => {
    const d = new Date(s.start);
    const today = new Date();
    return d.toDateString() === today.toDateString();
  });

  // Merge schedule events with actual feeds and sleeps for timeline
  const bottleFeeds = todayFeeds.filter(f => f.type === 'formula');

  // Group linked naps into compound nap chains: { id, kind:'compoundNap', parts:[sleep,...], start, end }
  const napSleeps = todaySleeps.filter(s => !s.isNight);
  const compoundNapGroups = [];
  const usedNapIds = new Set();
  napSleeps.forEach(s => {
    if (usedNapIds.has(s.id)) return;
    // Build a chain: find all naps linked to this one (directly or transitively)
    const chain = [s];
    usedNapIds.add(s.id);
    let tail = s;
    while (true) {
      const next = napSleeps.find(n => n.linkedToId === tail.id && !usedNapIds.has(n.id));
      if (!next) break;
      chain.push(next);
      usedNapIds.add(next.id);
      tail = next;
    }
    compoundNapGroups.push(chain);
  });

  // Map each logged nap chain to the scheduled nap slot it replaced
  // A chain replaces the closest unrecorded scheduled nap by start time
  const scheduledNaps = schedule.filter(e => e.type === 'nap');
  const replacedScheduledNapIds = new Set();
  const napChainToSlot = new Map(); // chain[0].id → scheduled nap label/index

  compoundNapGroups.forEach(chain => {
    // Only non-linked chains (i.e. the root of a chain) replace a scheduled slot
    if (chain[0].linkedToId) return; // sub-nap, not a root
    const chainStart = new Date(chain[0].start);
    let best = null, bestDiff = Infinity;
    scheduledNaps.forEach(sn => {
      if (replacedScheduledNapIds.has(sn.id)) return;
      const diff = Math.abs(new Date(sn.start) - chainStart);
      if (diff < bestDiff) { bestDiff = diff; best = sn; }
    });
    if (best) {
      replacedScheduledNapIds.add(best.id);
      napChainToSlot.set(chain[0].id, best.label);
    }
  });

  const allTimelineItems = [
    // Include scheduled events EXCEPT naps that have been replaced by a logged nap
    ...schedule.map(e => ({ ...e, kind: "scheduled" })).filter(e => !(e.type === 'nap' && replacedScheduledNapIds.has(e.id))),
    ...todaySleeps.filter(s => s.isNight).map(s => ({ id: `night-${s.id}`, kind: "nightSleep", label: "Night Sleep", subLabel: s.end ? durationLabel(diffMins(new Date(s.start), new Date(s.end))) : "Ongoing", start: new Date(s.start), type: "nightSleep", raw: s })),
    ...compoundNapGroups.map(chain => {
      const isCompound = chain.length > 1;
      const totalMs = chain.reduce((sum, s) => sum + (s.end ? new Date(s.end) - new Date(s.start) : 0), 0);
      const totalMins = Math.round(totalMs / 60000);
      const slotLabel = napChainToSlot.get(chain[0].id); // e.g. "Nap 1"
      // If no scheduled slot matched, number this nap by position among today's logged naps
      const napGroupIndex = compoundNapGroups.filter(g => !g[0].linkedToId).indexOf(chain);
      const fallbackLabel = napGroupIndex >= 0 ? `Nap ${napGroupIndex + 1}` : 'Nap';
      const baseLabel = slotLabel || fallbackLabel;
      return {
        id: `nap-actual-${chain[0].id}`,
        kind: isCompound ? 'compoundNap' : 'actualNap',
        type: 'nap',
        label: isCompound ? `${baseLabel} · Split` : baseLabel,
        subLabel: totalMins > 0 ? durationLabel(totalMins) : null,
        start: new Date(chain[0].start),
        end: chain[chain.length - 1].end ? new Date(chain[chain.length - 1].end) : null,
        parts: chain,
      };
    }),
    ...bottleFeeds.map(f => {
      const vol = parseFloat(f.consumed || f.offered || 0);
      const ml = f.unit === 'oz' ? Math.round(vol * 29.5735) : vol;
      return { id: `feed-${f.id}`, kind: "feed", type: "feed", label: `${ml}ml`, start: strToDate(f.time), raw: f };
    }),
  ].sort((a, b) => new Date(a.start) - new Date(b.start));

  const typeColors = {
    wake: { bg: PAL.wakeLight, dot: PAL.wake, text: PAL.text },
    nap: { bg: PAL.sleepLight, dot: PAL.sleep, text: PAL.text },
    sleep: { bg: PAL.sleepLight, dot: PAL.primaryDark, text: PAL.text },
    feed: { bg: PAL.feedLight, dot: PAL.feed, text: PAL.text },
    nightSleep: { bg: PAL.sleepLight, dot: "#7BA7C0", text: PAL.text },
  };

  return (
    <div style={{ paddingBottom: 100 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontFamily: "'Playfair Display',Georgia,serif", fontSize: 22, color: PAL.text }}>Today's Schedule</h2>
        <button onClick={() => setShowSettings(true)} style={{ background: PAL.soft, border: "none", borderRadius: 10, padding: "8px 14px", color: PAL.primary, fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
          ⚙️ Settings
        </button>
      </div>

      {/* Quick stats */}
      {scheduleSettings && (() => {
        const now = new Date();
        const midnight = new Date(now); midnight.setHours(0,0,0,0);
        // Total nap duration logged today (from actual sleeps, non-night)
        const completedNapMins = sleeps.filter(s => !s.isNight && s.end && new Date(s.start) >= midnight)
          .reduce((sum, s) => sum + diffMins(new Date(s.start), new Date(s.end)), 0);
        // Add current active nap if running
        const activeNapMins = activeSleep ? diffMins(activeSleep.start, now) : 0;
        const totalNapMins = completedNapMins + activeNapMins;
        // Total feed volume today (ml, formula + breast estimated)
        const totalFeedMl = feeds.filter(f => {
          const d = strToDate(f.time); return d >= midnight;
        }).reduce((sum, f) => {
          if (f.type === 'formula') {
            const vol = parseFloat(f.consumed || f.offered || 0);
            return sum + (f.unit === 'oz' ? Math.round(vol * 29.5735) : vol);
          }
          return sum; // breast feeds don't count toward ml total
        }, 0);
        // Next nap or current nap status
        const napEvents = schedule.filter(e => e.type === 'nap');
        let napStatusLabel = '', napStatusValue = '';
        if (activeSleep) {
          napStatusLabel = 'Nap duration';
          const m = Math.floor(activeNapMins); const h = Math.floor(m/60); const mm = m%60;
          napStatusValue = h > 0 ? `${h}h ${mm}m` : `${mm}m`;
        } else {
          const nextNap = napEvents.find(e => new Date(e.start) > now);
          if (nextNap) {
            napStatusLabel = 'Next nap';
            const minsUntil = diffMins(now, new Date(nextNap.start));
            const h = Math.floor(minsUntil/60); const m = minsUntil%60;
            napStatusValue = h > 0 ? `${h}h ${m}m` : `${m}m`;
          } else {
            napStatusLabel = 'Next nap'; napStatusValue = '—';
          }
        }
        return (
          <div style={{ display: 'flex', gap: 10, marginBottom: 20, overflowX: 'auto', paddingBottom: 4 }}>
            {[
              { label: 'Total Naps', value: totalNapMins > 0 ? durationLabel(totalNapMins) : '0m', icon: '💤' },
              { label: 'Total Feed', value: totalFeedMl > 0 ? `${totalFeedMl}ml` : '0ml', icon: '🍼' },
              { label: napStatusLabel, value: napStatusValue, icon: activeSleep ? '⏱' : '⏰' },
            ].map(s => (
              <div key={s.label} style={{ flex: 1, minWidth: 90, background: PAL.card, borderRadius: 14, padding: '12px 10px', textAlign: 'center', boxShadow: '0 2px 10px rgba(0,0,0,0.05)' }}>
                <div style={{ fontSize: 18 }}>{s.icon}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: PAL.text, marginTop: 4 }}>{s.value}</div>
                <div style={{ fontSize: 11, color: PAL.muted }}>{s.label}</div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Active sleep tracker */}
      {activeSleep ? (
        <NapTimerCard
          activeSleep={activeSleep}
          lastNapId={todaySleeps.filter(s => !s.isNight).slice(-1)[0]?.id || null}
          onEnd={(napStart, napEnd, linkedToId) => {
            const napId = Date.now();
            onSaveSleep({ id: napId, start: napStart, end: napEnd, isNight: false, linkedToId: linkedToId || null });
            if (linkedToId) {
              // Sub-nap: rebuild from the compound nap's final end
              const allNapSleeps = [...todaySleeps, { id: napId, start: napStart, end: napEnd, linkedToId }];
              let rootId = linkedToId;
              for (let i = 0; i < 10; i++) {
                const parent = allNapSleeps.find(s => s.id === rootId);
                if (!parent || !parent.linkedToId) break;
                rootId = parent.linkedToId;
              }
              const rootSleep = allNapSleeps.find(s => s.id === rootId);
              if (rootSleep) {
                const idx = schedule.findIndex(ev => ev.type === 'nap' && ev._recorded &&
                  Math.abs(new Date(ev.start) - new Date(rootSleep.start)) < 60 * 60 * 1000);
                if (idx >= 0) {
                  const updated = schedule.map((ev, i) => i === idx ? { ...ev, end: napEnd } : ev);
                  onUpdateSchedule(rebuildFromIndex(updated, idx, scheduleSettings));
                }
              }
            } else {
              const unrecorded = schedule.map((ev, idx) => ({ ev, idx })).filter(({ ev }) => ev.type === 'nap' && !ev._recorded);
              if (unrecorded.length > 0) {
                const { idx: napIdx } = unrecorded.reduce((best, cur) => {
                  const diff = Math.abs(new Date(cur.ev.start) - napStart);
                  return diff < best.diff ? { ...cur, diff } : best;
                }, { diff: Infinity, idx: -1 });
                if (napIdx >= 0) {
                  const updated = schedule.map((ev, i) => i === napIdx ? { ...ev, start: napStart, end: napEnd, _recorded: true, originalDurationMins: Math.max(ev.originalDurationMins || 0, diffMins(napStart, napEnd)) } : ev);
                  onUpdateSchedule(rebuildFromIndex(updated, napIdx, scheduleSettings));
                }
              }
            }
            setActiveSleep(null);
          }}
        />
      ) : (
        <>
          <button onClick={() => setShowNapModal(true)} style={{ width: "100%", marginBottom: 12, padding: "12px", borderRadius: 12, border: `1.5px dashed ${PAL.sleep}`, background: "transparent", color: PAL.sleep, fontWeight: 700, cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>
            💤 Log a Nap
          </button>
          <button onClick={() => setShowFeedModal(true)} style={{ width: "100%", marginBottom: 12, padding: "12px", borderRadius: 12, border: `1.5px dashed ${PAL.feed}`, background: "transparent", color: PAL.feed, fontWeight: 700, cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>
            🍼 Log a Feed
          </button>
          <button onClick={() => setShowAI(true)} style={{ width: "100%", marginBottom: 20, padding: "12px", borderRadius: 12, border: "none", background: `linear-gradient(135deg, #7C9E8A, #A8C4D4)`, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14, fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <span style={{ fontSize: 16 }}>✨</span> Ask AI
          </button>
        </>
      )}

      {/* Timeline */}
      {schedule.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px 20px", color: PAL.muted }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📅</div>
          <p style={{ margin: 0, fontSize: 15 }}>No schedule yet.<br />Tap ⚙️ Settings to create one.</p>
        </div>
      ) : (
        <div style={{ position: "relative" }}>
          <div style={{ position: "absolute", left: 22, top: 0, bottom: 0, width: 2, background: PAL.border, borderRadius: 1 }} />
          {allTimelineItems.map((ev, i) => {
            const c = typeColors[ev.type] || typeColors.wake;
            const isScheduled = ev.kind === "scheduled";
            const nextEv = allTimelineItems[i + 1];
            // Use end time if available (naps, compound naps) so the gap reflects
            // the actual wake window between the end of this event and the start of the next

            // Determine live/past/future state
            const evStart = new Date(ev.start);
            const evEnd = ev.end ? new Date(ev.end) : (nextEv ? new Date(nextEv.start) : null);
            const isLive = evStart <= now && (evEnd ? now < evEnd : true);
            const isPast = evEnd ? now >= evEnd : evStart < now;
            return (
              <div key={ev.id}>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start", position: "relative" }}>
                  <div style={{ width: 46, flexShrink: 0, display: "flex", justifyContent: "center", position: "relative" }}>
                    {isLive && (
                      <div style={{ position: "absolute", width: 22, height: 22, borderRadius: "50%", background: c.dot, opacity: 0.25, top: 10, zIndex: 0,
                        animation: "pulse 1.8s ease-in-out infinite" }} />
                    )}
                    <div style={{ width: isLive ? 16 : 14, height: isLive ? 16 : 14, borderRadius: "50%",
                      background: isPast ? PAL.border : c.dot,
                      border: `3px solid ${PAL.card}`,
                      boxShadow: isLive ? `0 0 0 2px ${c.dot}, 0 0 12px ${c.dot}88` : `0 0 0 2px ${isPast ? PAL.border : c.dot}`,
                      marginTop: isLive ? 13 : 14, zIndex: 1, transition: "all 0.3s" }} />
                  </div>
                  {ev.kind === "feed" ? (
                    <div style={{ width: "50%", background: PAL.feedLight, borderRadius: 14, padding: "8px 12px", display: "flex", justifyContent: "space-between", alignItems: "center",
                      opacity: isPast ? 0.5 : 1 }}>
                      <span style={{ fontWeight: 700, fontSize: 13, color: PAL.feed }}>🍼 {ev.label}</span>
                      <span style={{ fontSize: 12, color: PAL.muted }}>{fmt12(new Date(ev.start))}</span>
                    </div>
                  ) : ev.kind === "compoundNap" ? (
                    <div style={{ flex: 1, borderRadius: 14, overflow: 'hidden', border: `2px solid ${PAL.sleep}`, opacity: isPast ? 0.55 : 1 }}>
                      {/* Header */}
                      <div style={{ background: PAL.sleep, padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <span style={{ fontWeight: 700, fontSize: 14, color: '#fff' }}>💤 {ev.label}</span>
                          <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.75)', marginLeft: 8 }}>{ev.subLabel} total · {ev.parts.length} parts</span>
                        </div>
                        <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.75)' }}>{fmt12(new Date(ev.parts[0].start))}</span>
                      </div>
                      {/* Sub-nap parts with wake gap between them */}
                      {ev.parts.map((part, pi) => {
                        const dur = part.end ? durationLabel(diffMins(new Date(part.start), new Date(part.end))) : 'ongoing';
                        const nextPart = ev.parts[pi + 1];
                        const gapMins = part.end && nextPart ? diffMins(new Date(part.end), new Date(nextPart.start)) : null;
                        return (
                          <React.Fragment key={part.id}>
                            <div onClick={() => setEditSleep(part)} style={{ background: pi % 2 === 0 ? PAL.sleepLight : PAL.card, padding: '8px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: `1px solid ${PAL.border}`, cursor: 'pointer' }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                <span style={{ fontSize: 13, color: PAL.text, fontWeight: 600 }}>Part {pi + 1}</span>
                                <span style={{ fontSize: 11, color: PAL.primary }}>✏️</span>
                              </div>
                              <span style={{ fontSize: 12, color: PAL.muted }}>{fmt12(new Date(part.start))}{part.end ? ` – ${fmt12(new Date(part.end))}` : ''} · {dur}</span>
                            </div>
                            {gapMins !== null && gapMins > 0 && (
                              <div style={{ background: PAL.wakeLight, padding: '5px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: `1px dashed ${PAL.border}` }}>
                                <span style={{ fontSize: 11, color: PAL.muted, fontStyle: 'italic' }}>awake</span>
                                <span style={{ fontSize: 11, color: PAL.muted, fontWeight: 600 }}>{durationLabel(gapMins)}</span>
                              </div>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </div>
                  ) : ev.kind === "actualNap" ? (
                    <div onClick={() => ev.parts && ev.parts[0] && setEditSleep(ev.parts[0])} style={{ flex: 1, background: PAL.sleepLight, borderRadius: 14, padding: '10px 14px', border: `1.5px solid ${PAL.sleep}55`, opacity: isPast ? 0.55 : 1, cursor: 'pointer' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{ fontWeight: 700, fontSize: 14, color: PAL.text }}>💤 {ev.label}</span>
                          <span style={{ fontSize: 11, color: PAL.primary }}>✏️</span>
                        </div>
                        <span style={{ fontSize: 12, color: PAL.muted }}>{fmt12(new Date(ev.start))}{ev.end ? ` – ${fmt12(new Date(ev.end))}` : ''}</span>
                      </div>
                      {ev.subLabel && <div style={{ fontSize: 12, color: PAL.muted, marginTop: 2 }}>{ev.subLabel}</div>}
                    </div>
                  ) : (
                    <div style={{ flex: 1, borderRadius: 14, padding: "12px 14px",
                      cursor: isScheduled && ev.editable ? "pointer" : "default",
                      background: isLive ? c.dot + "22" : c.bg,
                      border: isLive ? `2px solid ${c.dot}` : "2px solid transparent",
                      opacity: isPast ? 0.45 : 1,
                      transition: "all 0.3s" }}
                      onClick={() => isScheduled && ev.editable && setEditEvent(ev)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          {isLive && <span style={{ fontSize: 10, fontWeight: 800, color: c.dot, background: c.dot + "22", borderRadius: 6, padding: "2px 6px", letterSpacing: 0.5 }}>NOW</span>}
                          <span style={{ fontWeight: isLive ? 800 : 700, fontSize: 14, color: PAL.text }}>{ev.label}</span>
                          {ev.subLabel && <span style={{ fontSize: 12, color: PAL.muted }}>{ev.subLabel}</span>}
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                            <span style={{ fontSize: 13, color: PAL.muted }}>{fmt12(new Date(ev.start))}</span>
                            {isScheduled && ev.editable && <span style={{ fontSize: 11, color: PAL.primary }}>✏️</span>}
                          </div>
                          {ev.type === "nap" && ev.end && (
                            <span style={{ fontSize: 12, color: PAL.muted }}>until {fmt12(new Date(ev.end))} · {durationLabel(diffMins(new Date(ev.start), new Date(ev.end)))}</span>
                          )}
                          {ev.type === "wake" && nextEv && (
                            <span style={{ fontSize: 12, color: PAL.muted }}>until {fmt12(new Date(nextEv.start))} · {durationLabel(diffMins(new Date(ev.start), new Date(nextEv.start)))}</span>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </div>

              </div>
            );
          })}
        </div>
      )}

      {/* Modals */}
      {showSettings && <ScheduleSettingsModal settings={scheduleSettings} onSave={s => { localStorage.setItem('lb_settings', JSON.stringify(s)); onSaveScheduleSettings(s); onUpdateSchedule(generateSchedule(s)); }} onClose={() => setShowSettings(false)} />}
      {showNapModal && <NapLogModal
        todaySleeps={todaySleeps}
        schedule={schedule}
        scheduleSettings={scheduleSettings}
        activeSleep={activeSleep}
        onStartTimer={() => { setActiveSleep({ start: new Date() }); setShowNapModal(false); }}
        onSaveNap={(napStart, napEnd, linkedToId) => {
          const napId = Date.now();
          onSaveSleep({ id: napId, start: napStart, end: napEnd, isNight: false, linkedToId: linkedToId || null });
          if (linkedToId) {
            // This is a sub-nap. Find the chain root sleep record to locate the replaced scheduled slot.
            // The chain root is the sleep whose id = linkedToId (or its root).
            // We rebuild from napEnd so the wake window after the compound nap is correctly placed.
            const allNapSleeps = [...todaySleeps, { id: napId, start: napStart, end: napEnd, linkedToId }];
            // Walk up the chain to find the root
            let rootId = linkedToId;
            for (let i = 0; i < 10; i++) {
              const parent = allNapSleeps.find(s => s.id === rootId);
              if (!parent || !parent.linkedToId) break;
              rootId = parent.linkedToId;
            }
            const rootSleep = allNapSleeps.find(s => s.id === rootId);
            if (rootSleep) {
              // Find the scheduled nap replaced by this chain root
              const napIdx = schedule.findIndex(ev => ev.type === 'nap' && ev._recorded &&
                Math.abs(new Date(ev.start) - new Date(rootSleep.start)) < 60 * 60 * 1000);
              const fallbackIdx = schedule.findIndex(ev => ev.type === 'nap' && ev._recorded);
              const idx = napIdx >= 0 ? napIdx : fallbackIdx;
              if (idx >= 0) {
                // Rebuild from the compound nap's final end (napEnd = last part end)
                const updated = schedule.map((ev, i) => i === idx ? { ...ev, end: napEnd } : ev);
                onUpdateSchedule(rebuildFromIndex(updated, idx, scheduleSettings));
              }
            }
          } else {
            // Root nap — find the closest unrecorded scheduled nap and replace it
            const unrecorded = schedule.map((ev, idx) => ({ ev, idx })).filter(({ ev }) => ev.type === 'nap' && !ev._recorded);
            if (unrecorded.length > 0) {
              const { idx: napIdx } = unrecorded.reduce((best, cur) => {
                const diff = Math.abs(new Date(cur.ev.start) - napStart);
                return diff < best.diff ? { ...cur, diff } : best;
              }, { diff: Infinity, idx: -1 });
              if (napIdx >= 0) {
                const updated = schedule.map((ev, i) => i === napIdx ? { ...ev, start: napStart, end: napEnd, _recorded: true, originalDurationMins: Math.max(ev.originalDurationMins || 0, diffMins(napStart, napEnd)) } : ev);
                onUpdateSchedule(rebuildFromIndex(updated, napIdx, scheduleSettings));
              }
            }
          }
          setShowNapModal(false);
        }}
        onClose={() => setShowNapModal(false)}
      />}
      {editSleep && (
        <SleepModal
          initial={editSleep}
          isNight={false}
          onSave={(updated) => {
            // Update the sleep record
            onSaveSleep(updated);
            // Find which scheduled nap slot this sleep belongs to and rebuild
            const napSleepsUpdated = [...todaySleeps.filter(s => s.id !== updated.id), updated]
              .filter(s => !s.isNight);
            // Find root of this sleep's chain
            let rootId = updated.linkedToId ? updated.linkedToId : updated.id;
            for (let i = 0; i < 10; i++) {
              const parent = napSleepsUpdated.find(s => s.id === rootId);
              if (!parent || !parent.linkedToId) break;
              rootId = parent.linkedToId;
            }
            const rootSleep = napSleepsUpdated.find(s => s.id === rootId);
            if (rootSleep) {
              const napIdx = schedule.findIndex(ev =>
                ev.type === 'nap' && ev._recorded &&
                Math.abs(new Date(ev.start) - new Date(rootSleep.start)) < 2 * 60 * 60 * 1000
              );
              if (napIdx >= 0) {
                // Use the latest end time of the whole chain as the rebuild cursor
                const chainEnd = napSleepsUpdated
                  .filter(s => {
                    let id = s.linkedToId;
                    while (id) {
                      if (id === rootId) return true;
                      const p = napSleepsUpdated.find(x => x.id === id);
                      id = p?.linkedToId;
                    }
                    return s.id === rootId;
                  })
                  .reduce((latest, s) => s.end && new Date(s.end) > latest ? new Date(s.end) : latest, new Date(rootSleep.end || rootSleep.start));
                const updatedSchedule = schedule.map((ev, i) =>
                  i === napIdx ? { ...ev, end: chainEnd } : ev
                );
                onUpdateSchedule(rebuildFromIndex(updatedSchedule, napIdx, scheduleSettings));
              }
            }
            setEditSleep(null);
          }}
          onClose={() => setEditSleep(null)}
        />
      )}
      {showAI && <AILogModal
        schedule={schedule}
        scheduleSettings={scheduleSettings}
        onSaveFeed={onSaveFeed}
        onSaveSleep={onSaveSleep}
        onUpdateSchedule={onUpdateSchedule}
        onClose={() => setShowAI(false)}
      />}
      {editEvent && <EditEventModal event={editEvent} scheduleSettings={scheduleSettings} allEvents={schedule} onSave={onUpdateSchedule} onClose={() => setEditEvent(null)} />}
      {(showFeedModal || editFeed) && <FeedModal initial={editFeed} onSave={onSaveFeed} onClose={() => { setShowFeedModal(false); setEditFeed(null); }} />}
      {showNightSleep && <SleepModal isNight onSave={onSaveSleep} onClose={() => setShowNightSleep(false)} />}
    </div>
  );
}

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {[...todaySleeps].reverse().map(s => (

            </div>
          ))}
        </div>
      )}
    </div>
  );

// ─── Main App ─────────────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  wakeTime: "07:00",
  bedTime: "19:30",
  numNaps: 3,
  wakeWindowMins: 180,
  napDurationMins: 35,
  bedtimeToleranceMins: 60,
  bridgingNapMins: 20,
};

export default function App() {
  // ── Clear all stored data so the app starts fresh as a new user ──
  useEffect(() => {
    ['lb_user','lb_baby','lb_settings','lb_schedule','lb_feeds','lb_sleeps'].forEach(k => localStorage.removeItem(k));
  }, []);

  const [user, setUser] = useState(() => {
    try { const u = localStorage.getItem('lb_user'); return u ? JSON.parse(u) : null; } catch { return null; }
  });
  const [babyProfile, setBabyProfile] = useState(() => {
    try { const b = localStorage.getItem('lb_baby'); return b ? JSON.parse(b) : null; } catch { return null; }
  });
  const [tab, setTab] = useState("schedule");

  const [feeds, setFeeds] = useState(() => {
    try { const f = localStorage.getItem('lb_feeds'); return f ? JSON.parse(f) : []; } catch { return []; }
  });
  const [sleeps, setSleeps] = useState(() => {
    try { const s = localStorage.getItem('lb_sleeps'); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [scheduleSettings, setScheduleSettings] = useState(() => {
    try { const s = localStorage.getItem('lb_settings'); return s ? JSON.parse(s) : DEFAULT_SETTINGS; } catch { return DEFAULT_SETTINGS; }
  });
  const [schedule, setSchedule] = useState(() => {
    try {
      const saved = localStorage.getItem('lb_schedule');
      if (saved) {
        // Rehydrate Date objects
        const parsed = JSON.parse(saved);
        return parsed.map(e => ({
          ...e,
          start: e.start ? new Date(e.start) : null,
          end: e.end ? new Date(e.end) : null,
        }));
      }
      // No saved schedule — generate from saved settings if baby profile exists
      const baby = localStorage.getItem('lb_baby');
      const settings = localStorage.getItem('lb_settings');
      if (baby && settings) return generateSchedule(JSON.parse(settings));
    } catch {}
    return [];
  });

  const handleAuth = useCallback((u) => {
    localStorage.setItem('lb_user', JSON.stringify(u));
    setUser(u);
  }, []);
  const handleLogout = useCallback(() => {
    localStorage.removeItem('lb_user');
    setUser(null);
  }, []);

  const handleOnboardingComplete = useCallback((baby, settings) => {
    localStorage.setItem('lb_baby', JSON.stringify(baby));
    localStorage.setItem('lb_settings', JSON.stringify(settings));
    setBabyProfile(baby);
    setScheduleSettings(settings);
    const newSchedule = generateSchedule(settings);
    localStorage.setItem('lb_schedule', JSON.stringify(newSchedule));
    setSchedule(newSchedule);
  }, []);

  const saveSchedule = useCallback((sched) => {
    localStorage.setItem('lb_schedule', JSON.stringify(sched));
    setSchedule(sched);
  }, []);

  const saveFeed = useCallback((f) => setFeeds(prev => {
    const next = (() => {
      const idx = prev.findIndex(x => x.id === f.id);
      if (idx >= 0) { const n = [...prev]; n[idx] = f; return n; }
      return [...prev, f];
    })();
    localStorage.setItem('lb_feeds', JSON.stringify(next));
    return next;
  }), []);

  const saveSleep = useCallback((s) => setSleeps(prev => {
    const next = (() => {
      const idx = prev.findIndex(x => x.id === s.id);
      if (idx >= 0) { const n = [...prev]; n[idx] = s; return n; }
      return [...prev, s];
    })();
    localStorage.setItem('lb_sleeps', JSON.stringify(next));
    return next;
  }), []);

  if (!user) return <AuthScreen onAuth={handleAuth} />;
  if (!babyProfile) return <OnboardingScreen onComplete={handleOnboardingComplete} />;

  const tabs = [
    { id: "schedule", icon: "📅", label: "Schedule" },
    { id: "summary", icon: "📊", label: "Summary" },
    { id: "settings", icon: "👤", label: "Account" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: PAL.bg, fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap');* { box-sizing: border-box; } body { margin: 0; } @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.25; } 50% { transform: scale(1.7); opacity: 0.08; } } @keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {/* Header */}
      <div style={{ background: PAL.card, borderBottom: `1px solid ${PAL.border}`, padding: "14px 20px", display: "flex", alignItems: "center", gap: 10, position: "sticky", top: 0, zIndex: 10 }}>
        <span style={{ fontSize: 22 }}>🌙</span>
        <span style={{ fontFamily: "'Playfair Display',Georgia,serif", fontSize: 20, color: PAL.text, fontWeight: 700 }}>LullaByte</span>
        <span style={{ marginLeft: "auto", fontSize: 13, background: PAL.primary, color: "#fff", borderRadius: 20, padding: "3px 10px", fontWeight: 600 }}>Today</span>
      </div>

      {/* Content */}
      <div style={{ padding: "20px 16px 80px", maxWidth: 500, margin: "0 auto" }}>
        {tab === "schedule" && (
          <ScheduleTab
            schedule={schedule}
            scheduleSettings={scheduleSettings}
            feeds={feeds}
            sleeps={sleeps}
            onUpdateSchedule={saveSchedule}
            onSaveScheduleSettings={(s) => { localStorage.setItem('lb_settings', JSON.stringify(s)); setScheduleSettings(s); }}
            onSaveFeed={saveFeed}
            onSaveSleep={saveSleep}
          />
        )}
        {tab === "summary" && <SummaryTab feeds={feeds} sleeps={sleeps} />}
        {tab === "settings" && <SettingsTab user={user} onLogout={handleLogout} />}
      </div>

      {/* Bottom nav */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: PAL.card, borderTop: `1px solid ${PAL.border}`, display: "flex", justifyContent: "space-around", padding: "10px 0 16px", zIndex: 10 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            border: "none", background: "none", cursor: "pointer", fontFamily: "inherit",
            color: tab === t.id ? PAL.primary : PAL.muted, flex: 1,
          }}>
            <span style={{ fontSize: 22 }}>{t.icon}</span>
            <span style={{ fontSize: 11, fontWeight: tab === t.id ? 700 : 500 }}>{t.label}</span>
            {tab === t.id && <div style={{ width: 20, height: 3, background: PAL.primary, borderRadius: 2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(App));
  </script>
</body>
</html>
